apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: template-mcp-server
  labels:
    app: template-mcp-server
    app.kubernetes.io/name: template-mcp-server
    app.kubernetes.io/component: mcp-server
spec:
  to:
    kind: Service
    name: template-mcp-server
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None 